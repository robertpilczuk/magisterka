services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./backend/model:/app/model
      - ./backend/model_books:/app/model_books
      - ./data/books:/app/data/books:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_DIR=/app/data
      - DATA_DIR_BOOKS=/app/data/books
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000